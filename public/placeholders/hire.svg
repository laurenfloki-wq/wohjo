<?xml version="1.0" encoding="UTF-8"?>
<!--
  Labour hire scene — multi-building site with multiple worker
  figures distant; reads as "labour-hire company moving crews
  between sites". [TEMPORARY: replace with Batch-11 photography]
  Self-hosted SVG; full-bleed background under dark overlay
  gradient. Multiple buildings + scaffolding + small worker
  silhouettes for scale.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-h" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3a342a"/>
      <stop offset="55%"  stop-color="#221d17"/>
      <stop offset="100%" stop-color="#0f0f10"/>
    </linearGradient>
    <linearGradient id="city-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d9a548" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d9a548" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="2000" height="1200" fill="url(#bg-h)"/>
  <rect width="2000" height="600" fill="url(#city-glow)"/>

  <!-- Far-back skyline -->
  <g fill="#1a1a1c" opacity="0.7">
    <rect x="0"    y="450" width="160"  height="450"/>
    <rect x="160"  y="380" width="120"  height="520"/>
    <rect x="280"  y="430" width="100"  height="470"/>
    <rect x="1620" y="420" width="140"  height="480"/>
    <rect x="1760" y="380" width="120"  height="520"/>
    <rect x="1880" y="450" width="120"  height="450"/>
  </g>

  <!-- Mid-distance: three buildings with scaffolding -->
  <g>
    <!-- Building 1 (left) -->
    <rect x="430" y="400" width="280" height="700" fill="#1a1a1c"/>
    <g stroke="#26262a" stroke-width="2.5" fill="none">
      <rect x="430" y="400" width="280" height="700"/>
      <line x1="430" y1="500" x2="710" y2="500"/>
      <line x1="430" y1="600" x2="710" y2="600"/>
      <line x1="430" y1="700" x2="710" y2="700"/>
      <line x1="430" y1="800" x2="710" y2="800"/>
      <line x1="430" y1="900" x2="710" y2="900"/>
      <line x1="430" y1="1000" x2="710" y2="1000"/>
      <line x1="500" y1="400" x2="500" y2="1100"/>
      <line x1="570" y1="400" x2="570" y2="1100"/>
      <line x1="640" y1="400" x2="640" y2="1100"/>
    </g>
    <g fill="#0f0f10">
      <rect x="450" y="430" width="40" height="50"/>
      <rect x="520" y="430" width="40" height="50"/>
      <rect x="590" y="530" width="40" height="50"/>
      <rect x="450" y="730" width="40" height="50"/>
      <rect x="660" y="930" width="40" height="50"/>
    </g>
    <!-- Crane on top -->
    <g fill="#0f0f10">
      <polygon points="540,400 560,400 565,180 535,180"/>
      <polygon points="535,180 540,180 540,200 1100,200 1100,180 535,180"/>
    </g>

    <!-- Building 2 (centre) -->
    <rect x="850" y="320" width="320" height="780" fill="#1a1a1c"/>
    <g stroke="#26262a" stroke-width="2.5" fill="none">
      <rect x="850" y="320" width="320" height="780"/>
      <line x1="850" y1="420" x2="1170" y2="420"/>
      <line x1="850" y1="520" x2="1170" y2="520"/>
      <line x1="850" y1="620" x2="1170" y2="620"/>
      <line x1="850" y1="720" x2="1170" y2="720"/>
      <line x1="850" y1="820" x2="1170" y2="820"/>
      <line x1="850" y1="920" x2="1170" y2="920"/>
      <line x1="850" y1="1020" x2="1170" y2="1020"/>
      <line x1="930"  y1="320" x2="930"  y2="1100"/>
      <line x1="1010" y1="320" x2="1010" y2="1100"/>
      <line x1="1090" y1="320" x2="1090" y2="1100"/>
    </g>
    <g fill="#0f0f10">
      <rect x="870"  y="350" width="50" height="60"/>
      <rect x="950"  y="450" width="50" height="60"/>
      <rect x="1030" y="350" width="50" height="60"/>
      <rect x="1110" y="650" width="50" height="60"/>
      <rect x="950"  y="850" width="50" height="60"/>
      <rect x="1030" y="950" width="50" height="60"/>
    </g>

    <!-- Building 3 (right) -->
    <rect x="1300" y="450" width="260" height="650" fill="#1a1a1c"/>
    <g stroke="#26262a" stroke-width="2.5" fill="none">
      <rect x="1300" y="450" width="260" height="650"/>
      <line x1="1300" y1="550" x2="1560" y2="550"/>
      <line x1="1300" y1="650" x2="1560" y2="650"/>
      <line x1="1300" y1="750" x2="1560" y2="750"/>
      <line x1="1300" y1="850" x2="1560" y2="850"/>
      <line x1="1300" y1="950" x2="1560" y2="950"/>
      <line x1="1380" y1="450" x2="1380" y2="1100"/>
      <line x1="1460" y1="450" x2="1460" y2="1100"/>
    </g>
    <g fill="#0f0f10">
      <rect x="1320" y="480" width="50" height="50"/>
      <rect x="1400" y="580" width="50" height="50"/>
      <rect x="1480" y="780" width="50" height="50"/>
      <rect x="1320" y="880" width="50" height="50"/>
    </g>
  </g>

  <!-- Small worker figures distributed across the foreground for scale -->
  <g fill="#0f0f10">
    <!-- worker 1 -->
    <rect x="240" y="1010" width="14" height="50"/>
    <circle cx="247" cy="1000" r="9"/>
    <ellipse cx="247" cy="990" rx="11" ry="5" fill="#d9a548"/>

    <!-- worker 2 -->
    <rect x="780" y="1020" width="14" height="50"/>
    <circle cx="787" cy="1010" r="9"/>
    <ellipse cx="787" cy="1000" rx="11" ry="5" fill="#d9a548"/>

    <!-- worker 3 -->
    <rect x="1200" y="1010" width="14" height="50"/>
    <circle cx="1207" cy="1000" r="9"/>
    <ellipse cx="1207" cy="990" rx="11" ry="5" fill="#d9a548"/>

    <!-- worker 4 (with hi-vis vest band — forest accent) -->
    <rect x="1620" y="1015" width="14" height="50"/>
    <circle cx="1627" cy="1005" r="9"/>
    <ellipse cx="1627" cy="995" rx="11" ry="5" fill="#d9a548"/>
    <rect x="1618" y="1030" width="18" height="3" fill="#2d5f3f"/>

    <!-- worker 5 -->
    <rect x="1820" y="1010" width="14" height="50"/>
    <circle cx="1827" cy="1000" r="9"/>
    <ellipse cx="1827" cy="990" rx="11" ry="5" fill="#d9a548"/>
  </g>

  <!-- Ground -->
  <rect y="1100" width="2000" height="100" fill="#0a0a0b"/>
</svg>
