<?xml version="1.0" encoding="UTF-8"?>
<!--
  Worker scene — close-up worker silhouette with tool, scaffolding behind.
  [TEMPORARY: replace with Batch-11 photography]
  Self-hosted SVG; full-bleed background under dark overlay gradient.
  Reads at scale: large worker figure foreground-right, scaffolding
  framework left, sunrise/sunset glow upper-left.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-w" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3f342a"/>
      <stop offset="50%"  stop-color="#2a221b"/>
      <stop offset="100%" stop-color="#0f0f10"/>
    </linearGradient>
    <radialGradient id="glow-w" cx="20%" cy="25%" r="40%">
      <stop offset="0%"   stop-color="#d9a548" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#d9a548" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="2000" height="1200" fill="url(#bg-w)"/>
  <rect width="2000" height="1200" fill="url(#glow-w)"/>

  <!-- Scaffolding lattice (left half, fading right) -->
  <g stroke="#1a1a1c" stroke-width="4" fill="none" opacity="0.85">
    <!-- Verticals -->
    <line x1="100"  y1="0" x2="100"  y2="1200"/>
    <line x1="280"  y1="0" x2="280"  y2="1200"/>
    <line x1="460"  y1="0" x2="460"  y2="1200"/>
    <line x1="640"  y1="0" x2="640"  y2="1200"/>
    <line x1="820"  y1="0" x2="820"  y2="1200"/>
    <line x1="1000" y1="0" x2="1000" y2="1200" opacity="0.5"/>
    <!-- Horizontals -->
    <line x1="0" y1="120"  x2="1100" y2="120"/>
    <line x1="0" y1="320"  x2="1100" y2="320"/>
    <line x1="0" y1="520"  x2="1100" y2="520"/>
    <line x1="0" y1="720"  x2="1100" y2="720"/>
    <line x1="0" y1="920"  x2="1100" y2="920"/>
    <!-- Diagonal braces -->
    <line x1="100"  y1="320" x2="280"  y2="120"/>
    <line x1="280"  y1="520" x2="460"  y2="320"/>
    <line x1="460"  y1="720" x2="640"  y2="520"/>
    <line x1="640"  y1="920" x2="820"  y2="720"/>
  </g>

  <!-- Worker silhouette (foreground-right, large) -->
  <g fill="#0f0f10">
    <!-- Body -->
    <path d="M 1300,1200 L 1300,820 Q 1300,780 1340,770 L 1480,770 Q 1520,780 1520,820 L 1520,1200 Z"/>
    <!-- Arm holding tool, raised -->
    <path d="M 1480,810 Q 1620,720 1700,520 L 1730,520 L 1730,500 L 1640,720 Q 1560,830 1480,860 Z"/>
    <!-- Tool head (hammer) -->
    <rect x="1700" y="480" width="60" height="40" fill="#2d5f3f"/>
    <rect x="1720" y="460" width="20" height="80" fill="#0f0f10"/>
    <!-- Other arm at side -->
    <path d="M 1300,820 Q 1260,900 1280,1000 L 1310,1000 Q 1320,920 1340,860 Z"/>
    <!-- Head + neck -->
    <rect x="1380" y="700" width="60" height="80" fill="#0f0f10"/>
    <ellipse cx="1410" cy="680" rx="44" ry="38"/>
  </g>

  <!-- Hi-vis hard hat (amber) + forest stripe -->
  <ellipse cx="1410" cy="640" rx="58" ry="22" fill="#d9a548"/>
  <ellipse cx="1410" cy="635" rx="48" ry="14" fill="#d9a548"/>
  <rect x="1352" y="635" width="116" height="6" fill="#2d5f3f"/>

  <!-- Hi-vis vest stripes (amber) on body -->
  <rect x="1300" y="900"  width="220" height="14" fill="#d9a548" opacity="0.9"/>
  <rect x="1300" y="940"  width="220" height="14" fill="#d9a548" opacity="0.9"/>

  <!-- Building edge silhouette far right -->
  <rect x="1820" y="200" width="180" height="1000" fill="#0a0a0b"/>
</svg>
