<?xml version="1.0" encoding="UTF-8"?>
<!--
  FLOSTRUCTION brand-identity F-mark, scalable.
  Used by the PWA manifest for home-screen install icons (192/512+
  contexts). Geometry verbatim from src/components/brand/FMark.tsx
  (variant: on-cream, full rails). Cream background framing so the
  navy F reads cleanly when the OS renders it at any size, including
  inside Android's adaptive-icon mask.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="FLOSTRUCTION">
  <title>FLOSTRUCTION</title>
  <!-- Cream background — mirrors brand-suite letterhead. -->
  <rect width="32" height="32" rx="4" fill="#F5F0E8"/>
  <!-- F-shape geometry from FMark.tsx (viewBox 28×28). Translate +2,+2
       to centre inside the 32×32 canvas. -->
  <g transform="translate(2 2)">
    <rect x="3" y="3" width="7" height="22" rx="1" fill="#0E1C2F"/>
    <rect x="3" y="3" width="18" height="7" rx="1" fill="#0E1C2F"/>
    <rect x="3" y="13" width="14" height="6" rx="1" fill="#0E1C2F"/>
    <!-- Flow rails — primary at top arm, secondary at middle (65% opacity) -->
    <rect x="15" y="8" width="9" height="3" rx="1" fill="#166534"
          transform="rotate(-20 15 8)"/>
    <rect x="16.5" y="16" width="6.5" height="2" rx="1" fill="#166534"
          opacity="0.65" transform="rotate(-20 16.5 16)"/>
  </g>
</svg>
