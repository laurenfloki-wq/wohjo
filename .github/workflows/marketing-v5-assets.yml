# TEMPORARY — marketing v5 asset materialisation (delete at merge).
# Rev 7: materialise the Phase 0 capture evidence set (15 JPEGs,
# desktop beats + 390px mobile + reduced-motion) from a 24-hour
# transfer URL, verified against a SHA-256 pin baked into this file.
# Idempotent: skips when the captures are already in the tree. Pushes
# made by this job use the default GITHUB_TOKEN and cannot re-trigger
# workflow runs.
name: marketing v5 assets (temporary)

on:
  push:
    branches: [feat/marketing-v5-2026-06-10]

permissions:
  contents: write

jobs:
  materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/marketing-v5-2026-06-10

      - name: Skip if captures already materialised
        id: guard
        run: |
          if [ -f gate-reports/marketing-v5/captures/01-hero-loaded.jpg ]; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
            echo 'Captures already present; nothing to do.'
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch capture tarball and verify SHA-256 pin
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          mkdir -p gate-reports/marketing-v5/captures
          curl -fsSL --retry 3 -o /tmp/captures.tgz 'https://litter.catbox.moe/jk7jx0.tgz'
          printf '%s  %s\n' '9c2c7d8078591184d9ef5b4c75e7e7bbc124d6179178d92e6beb01b48572fa37' '/tmp/captures.tgz' > /tmp/pins.txt
          sha256sum -c /tmp/pins.txt
          tar xzf /tmp/captures.tgz -C gate-reports/marketing-v5/captures
          ls gate-reports/marketing-v5/captures

      - name: Commit capture evidence set
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add gate-reports/marketing-v5/captures
          git commit -m 'marketing v5 phase 0: capture evidence set (CI-assisted, sha-verified)'
          git push origin HEAD:feat/marketing-v5-2026-06-10
