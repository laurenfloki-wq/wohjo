# TEMPORARY — marketing v5 asset materialisation (delete at merge).
# Rev 8: materialise the Phase 1 craft-pass file set from a 24-hour
# transfer URL, verified against a SHA-256 pin baked into this file.
# Idempotent: skips when og.png is already in the tree. Pushes made by
# this job use the default GITHUB_TOKEN and cannot re-trigger runs.
name: marketing v5 assets (temporary)

on:
  push:
    branches: [feat/marketing-v5-2026-06-10]

permissions:
  contents: write

jobs:
  materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/marketing-v5-2026-06-10

      - name: Skip if craft pass already materialised
        id: guard
        run: |
          if [ -f public/marketing/og.png ]; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
            echo 'Craft pass already present; nothing to do.'
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch craft-pass tarball and verify SHA-256 pin
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 -o /tmp/craft.tgz 'https://litter.catbox.moe/98zwc9.tgz'
          printf '%s  %s\n' 'cf527a95fcff40f7fd95d295a6346f3dfc73a66388a268138b0f28da0b832b94' '/tmp/craft.tgz' > /tmp/pins.txt
          sha256sum -c /tmp/pins.txt
          tar xzf /tmp/craft.tgz -C .
          git status --porcelain

      - name: Commit craft pass
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/app/page.tsx src/app/sitemap.ts src/components/marketing public/marketing/og.png
          git commit -m 'marketing v5: craft pass - metadata, social cards, icons, a11y, cross-browser' -m 'Identity: prototype-cased title, sub-160-char description mirroring the disclaimer restraint, OG/Twitter cards with a 1200x630 og.png built from the v5 visual language (ink, prototype mark, closing two-line headline), canonical URL, robots index, sitemap.ts backing the robots.txt sitemap line, theme-color #0b0907 (marketing route only). Loading: hero poster preloaded fetchpriority=high (video stays preload=none), three.js deferred to idle, unused Saira 600 weight dropped. Access: main#main skip-link target, single-h1 hierarchy (slides 2-4 are h2 with pixel-identical shared rules), 44px hit areas on dots and scene/chain controls. Behaviour: scene trigger now also fires when the stacked strip covers 55% of the viewport (mobile gap inherited from the prototype; approved by Lauren 2026-06-10).'
          git push origin HEAD:feat/marketing-v5-2026-06-10
