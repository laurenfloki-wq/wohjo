# SG-2 — cross-tenant RLS probe + FORCE RLS validation (real Postgres 17).
#
# Rebuilds the schema from committed migrations (same recipe as the
# full-graph attestation), seeds two tenants, and probes the actual RLS
# policies for cross-tenant isolation as authenticated / anon /
# service_role — then applies FORCE ROW LEVEL SECURITY everywhere and
# asserts app-role behaviour is unchanged. Owner-blindness evidence for
# the prod FORCE decision is printed in the job log.

name: Cross-tenant RLS probe (real Postgres 17)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls-probe:
    name: Cross-tenant RLS probe
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pg client library (harness driver)
        run: npm install --no-save pg@8

      - name: Start Postgres 17 with pg_stat_statements preloaded
        run: |
          docker run -d --name pg17 \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:17 \
            -c shared_preload_libraries=pg_stat_statements
          for i in $(seq 1 30); do
            if docker exec pg17 pg_isready -U postgres > /dev/null 2>&1; then
              echo "postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker exec pg17 pg_isready -U postgres

      - name: Run cross-tenant RLS probe
        env:
          PGURL: postgres://postgres:postgres@localhost:5432/postgres
        run: node scripts/rls-probe/rls-probe.mjs

      - name: Postgres logs on failure
        if: failure()
        run: docker logs pg17 | tail -100
