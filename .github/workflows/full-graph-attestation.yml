# Full-graph attestation gate (#116c).
#
# Spins up a Postgres 17 service container, installs pgcrypto + uuid-ossp,
# applies the auth/storage shim + genesis + 85 committed migrations,
# then runs scripts/.116c/full-graph-attestation.mjs to compute
# per-dimension immune fingerprints and diff against committed reference
# files in scripts/.116c/prod-*.txt.
#
# Exits 1 on any dimension drift, which fails the job.
#
# Not yet a required status check — see scripts/.116c/README.md for the
# branch-protection wiring once chat-Claude attests all dimensions.

name: Full-graph attestation (real Postgres 17)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  full-graph:
    name: Real-PG full-graph attestation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install pg client library (harness driver)
        run: npm install --no-save pg@8

      # Start postgres:17 manually via docker run so we can pass the
      # postgres command-line flag for shared_preload_libraries. GH Actions
      # services field doesn't support docker COMMAND (only docker create
      # options), and pg_stat_statements requires the preload at startup,
      # not a runtime CREATE EXTENSION before any session connects.
      - name: Start Postgres 17 with pg_stat_statements preloaded
        run: |
          docker run -d --name pg17 \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:17 \
            -c shared_preload_libraries=pg_stat_statements
          for i in $(seq 1 30); do
            if docker exec pg17 pg_isready -U postgres > /dev/null 2>&1; then
              echo "postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker exec pg17 pg_isready -U postgres

      - name: Run full-graph attestation
        env:
          PGURL: postgres://postgres:postgres@localhost:5432/postgres
        run: node scripts/.116c/full-graph-attestation.mjs

      - name: Postgres logs on failure
        if: failure()
        run: docker logs pg17 | tail -100

      - name: Upload rebuild artefacts (always — needed for reference generation)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebuild-dimensions-${{ github.run_id }}
          path: scripts/.116c/rebuild-*.txt
          retention-days: 14
