# Fleet deploy — push to main runs the gate, then deploys the bot fleet.
#
# Gate (required): tsc --noEmit + the eval suite. Deploy only runs if the gate
# passes. Secrets come from GitHub Actions secrets; runtime secrets live in
# Supabase / Vercel env. Deploy steps are guarded on the presence of secrets so
# the workflow is inert until credentials are provisioned (see SECRETS.md).

name: Fleet deploy

on:
  push:
    branches: [main]
    paths:
      - 'platform/**'
      - 'bots/**'
      - 'supabase/**'
      - 'evals/**'
      - '.github/workflows/fleet-deploy.yml'

concurrency:
  group: fleet-deploy
  cancel-in-progress: false

jobs:
  gate:
    name: Gate (typecheck + evals)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Eval suite (fleet)
        run: npx vitest run platform bots evals

  deploy:
    name: Deploy (Supabase + Vercel)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Guard — secrets present
        id: guard
        run: |
          if [ -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Supabase secrets not provisioned; skipping deploy (see SECRETS.md)."
          fi
      - name: Set up Supabase CLI
        if: steps.guard.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy Edge Functions
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      # Vercel (approval-ui + crons) deploys via the Vercel Git integration on
      # push to main; no explicit step needed here.
